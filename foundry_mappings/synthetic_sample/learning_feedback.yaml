metadata:
  name: "Synthetic Learning Feedback"
  source_ext: "csv"

cvs:
  - type: "aplo-ont:LearningFeedbackType"
    uri: "aplo-r:learningFeedbackType"
    instances:
      - "Corrective Feedback"
      - "Strategic Feedback"
      - "Motivational Feedback"

root:
  type: "aplo-ont:LearningFeedback"
  uri: "aplo-r:learningFeedback"
  varids: ["Learner", "Source", "Learning Feedback"]
  connections:
    - p: "rdf:value"
      o:
        datatype: "xsd:string"
        val_source: "Learning Feedback"
    - p: "aplo-ont:hasLearningFeedbackType"
      o:
        type: "aplo-ont:LearningFeedbackType"
        uri: "aplo-r:learningFeedbackType"
        varids: ["Learning Feedback Type"]
        connections:
          - p: "rdf:value"
            o:
              datatype: "xsd:string"
              val_source: "Learning Feedback Type"
    - p: "aplo-ont:affectsStrategy"
      o:
        type: "aplo-ont:LearningStrategy"
        uri: "aplo-r:learningStrategy"
        varids:
          ["Affects Learning Strategy Situation", "Affects Learning Strategy"]
        connections:
          - p: "aplo-ont:hasName"
            o:
              datatype: "xsd:string"
              val_source: "Affects Learning Strategy"
    - p: "aplo-ont:hasSource"
      o:
        type: "aplo-ont:Source"
        uri: "aplo-r:source"
        varids: ["Source"]
        connections:
          - p: "rdf:value"
            o:
              datatype: "xsd:string"
              val_source: "Source"
    - p: "aplo-ont:affectsAwarenessObservation"
      o:
        type: "aplo-ont:AwarenessObservation"
        uri: "aplo-r:awarenessObservation"
        varids:
          [
            "Learner",
            "Affects Awareness Observation Topic",
            "Affects Awareness Observation Skill",
            "Affects Awareness Observation",
          ]
        connections:
          - p: "rdf:value"
            o:
              datatype: "xsd:string"
              val_source: "Affects Awareness Observation"
    - p: "aplo-ont:hasResponseTime"
      o:
        type: "aplo-ont:TemporalExtent"
        uri: "aplo-r:temporalExtent"
        varids: ["Learner", "Source", "Learning Feedback", "Response Time Key"]
        connections:
          - p: "rdf:value"
            o:
              datatype: "xsd:string"
              val_source: "Response Time Type"
          - p: "time:inXSDDateTime"
            o:
              datatype: "xsd:dateTime"
              val_source: "Point In Time Value"
          - p: "rdf:value"
            o:
              datatype: "xsd:string"
              val_source: "Point In Time Reference System"
          - p: "rdf:value"
            o:
              datatype: "xsd:dateTime"
              val_source: "Interval Start Value"
          - p: "rdf:value"
            o:
              datatype: "xsd:string"
              val_source: "Interval Start Reference System"
          - p: "rdf:value"
            o:
              datatype: "xsd:dateTime"
              val_source: "Interval End Value"
          - p: "rdf:value"
            o:
              datatype: "xsd:string"
              val_source: "Interval End Reference System"

metadata:
  name: "Synthetic Learning Situations"
  source_ext: "csv"

root:
  type: "aplo-ont:LearningSituation"
  uri: "aplo-r:learningSituation"
  varids: ["Learning Situation"]
  connections:
    - p: "rdf:value"
      o:
        datatype: "xsd:string"
        val_source: "Learning Situation"
    - p: "aplo-ont:scopes"
      o:
        type: "edu-ont:Persona"
        uri: "edu-r:persona"
        varids: ["Scopes Persona"]
        connections:
          - p: "rdf:value"
            o:
              datatype: "xsd:string"
              val_source: "Scopes Persona"
    - p: "aplo-ont:requiresTopicKnowledge"
      o:
        type: "edu-ont:Topic"
        uri: "edu-r:topic"
        varids: ["Requires Prior Topic Knowledge"]
        split: " | "
        connections:
          - p: "rdf:value"
            o:
              datatype: "xsd:string"
              val_source: "Requires Prior Topic Knowledge"
